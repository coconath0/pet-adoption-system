<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/images/logo.jpeg">
    <link rel="stylesheet" href="/public/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <title>PAWS</title>
</head>
<body>
    <div class="app-shell">

        <!-- Left Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <img src="/images/logo.jpeg" alt="logo">
            </div>
            <nav class="sidebar-nav">
                <a href="/public/index.html" class="nav-item" title="Home">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                </a>
                <a href="#" class="nav-item active" title="Pets" onclick="showPanel('pet-list-panel')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
                </a>
                <a href="#" class="nav-item" title="Add Pet" onclick="showPanel('add-panel')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </a>
                <a href="#" class="nav-item" title="Find Pet" onclick="showPanel('search-panel')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                </a>
                <a href="#" class="nav-item" title="Edit Pet" onclick="showPanel('update-panel')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                </a>
                <a href="#" class="nav-item" title="Delete Pet" onclick="showPanel('delete-panel')">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">

            <!-- Search Bar -->
            <div class="top-bar">
                <div class="search-box">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" id="liveSearch" placeholder="Search pets..." oninput="filterPets(this.value)">
                </div>
            </div>

            <!-- Hero Banner -->
            <div class="hero-banner">
                <div class="hero-text">
                    <h2>Find your perfect companion</h2>
                    <p>Hello, welcome! 🐾</p>
                </div>
                <img src="/images/PAS-thumbnail.png" alt="Pet" class="hero-img">
            </div>

            <!-- Panels (only one visible at a time) -->

            <!-- Pet List Panel (default) -->
            <div id="pet-list-panel" class="panel active-panel">
                <div class="section-header">
                    <h3><span>Available</span> Pets</h3>
                    <div class="carousel-controls">
                        <button class="btn-refresh" onclick="fetchAllPets()">Refresh</button>
                        <button class="carousel-btn" id="prevBtn" onclick="slideCarousel(-1)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
                        </button>
                        <button class="carousel-btn" id="nextBtn" onclick="slideCarousel(1)">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
                        </button>
                    </div>
                </div>
                <div class="carousel-wrapper">
                    <div id="pets" class="carousel-track"></div>
                </div>
                <div id="carousel-dots" class="carousel-dots"></div>
            </div>

            <!-- Search / Pet Details Panel -->
            <div id="search-panel" class="panel">
                <div class="section-header">
                    <h3><span>Pet</span> Details</h3>
                </div>
                <div class="panel-form-card">
                    <input type="text" id="petName" placeholder="Enter pet name">
                    <button onclick="fetchPetDetails()">Get Details</button>
                    <div id="pet-info"></div>
                </div>
            </div>

            <!-- Add Pet Panel -->
            <div id="add-panel" class="panel">
                <div class="section-header">
                    <h3><span>Add</span> New Pet</h3>
                </div>
                <form id="addPetForm" enctype="multipart/form-data" class="panel-form-card">
                    <input type="text" id="newPetName" name="name" placeholder="Pet Name" required>
                    <input type="text" id="newPetSpecies" name="species" placeholder="Species" required>
                    <input type="text" id="newPetBreed" name="breed" placeholder="Breed" required>
                    <input type="number" id="newPetAge" name="age" placeholder="Age" required>
                    <label class="file-label">Upload Image</label>
                    <input type="file" id="newPetImage" name="imageFile" accept="image/*">
                    <label class="file-label">Or paste Image URL</label>
                    <input type="text" id="newPetImageUrl" name="imageUrl" placeholder="Image URL (optional)">
                    <button type="submit">Add Pet</button>
                </form>
            </div>

            <!-- Update Pet Panel -->
            <div id="update-panel" class="panel">
                <div class="section-header">
                    <h3><span>Update</span> Pet</h3>
                </div>
                <div class="panel-form-card">
                    <input type="text" id="updatePetName" placeholder="Pet Name to update">
                    <input type="text" id="updatePetSpecies" placeholder="New Species">
                    <input type="text" id="updatePetBreed" placeholder="New Breed">
                    <input type="number" id="updatePetAge" placeholder="New Age">
                    <button onclick="updatePet()">Update Pet</button>
                </div>
            </div>

            <!-- Delete Pet Panel -->
            <div id="delete-panel" class="panel">
                <div class="section-header">
                    <h3><span>Delete</span> Pet</h3>
                </div>
                <div class="panel-form-card">
                    <input type="text" id="deletePetName" placeholder="Enter pet name to delete">
                    <button class="btn-danger" onclick="deletePet()">Delete Pet</button>
                </div>
            </div>

        </main>

        <!-- Right Panel -->
        <aside class="right-panel">
            <div class="profile-card">
                <img src="/images/PAS-thumbnail.png" alt="avatar" class="profile-avatar">
                <div class="profile-info">
                    <h4>Pet Adoption</h4>
                    <p>System</p>
                    <button class="btn-sm">View All</button>
                </div>
            </div>

            <div class="right-section">
                <h3><span>Pet</span> Categories</h3>
                <div class="category-list">
                    <div class="category-item">
                        <img src="https://cdn-icons-png.flaticon.com/512/616/616408.png" alt="Dog">
                        <div>
                            <div class="cat-label">Dogs</div>
                        </div>
                        <button class="btn-tag" onclick="filterBySpecies('Dog')">View</button>
                    </div>
                    <div class="category-item">
                        <img src="https://cdn-icons-png.flaticon.com/512/1864/1864514.png" alt="Cat">
                        <div>
                            <div class="cat-label">Cats</div>
                        </div>
                        <button class="btn-tag" onclick="filterBySpecies('Cat')">View</button>
                    </div>
                    <div class="category-item">
                        <img src="https://cdn-icons-png.flaticon.com/512/2370/2370264.png" alt="All">
                        <div>
                            <div class="cat-label">All Pets</div>
                        </div>
                        <button class="btn-tag" onclick="filterBySpecies('')">View</button>
                    </div>
                </div>
            </div>

        </aside>

    </div>

    <script src="/public/script.js"></script>
    <script>
        function showPanel(panelId) {
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active-panel'));
            document.getElementById(panelId).classList.add('active-panel');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        // Carousel state
        let carouselIndex = 0;
        const CARDS_VISIBLE = 1;

        function updateCarousel() {
            const track = document.getElementById('pets');
            const cards = Array.from(track.querySelectorAll('.pet-card:not([style*="display: none"])'));
            const total = cards.length;
            if (!total) return;
            const maxIndex = Math.max(0, total - CARDS_VISIBLE);
            carouselIndex = Math.min(Math.max(carouselIndex, 0), maxIndex);
            const cardWidth = track.querySelector('.pet-card').offsetWidth + 14;
            track.style.transform = `translateX(-${carouselIndex * cardWidth}px)`;

            const dotsEl = document.getElementById('carousel-dots');
            dotsEl.innerHTML = '';
            const pages = Math.ceil(total / CARDS_VISIBLE);
            for (let i = 0; i < pages; i++) {
                const d = document.createElement('span');
                d.className = 'dot' + (i === Math.floor(carouselIndex / CARDS_VISIBLE) ? ' active' : '');
                d.onclick = () => { carouselIndex = i * CARDS_VISIBLE; updateCarousel(); };
                dotsEl.appendChild(d);
            }

            document.getElementById('prevBtn').disabled = carouselIndex === 0;
            document.getElementById('nextBtn').disabled = carouselIndex >= maxIndex;
        }

        function slideCarousel(dir) {
            carouselIndex += dir;
            updateCarousel();
        }

        function filterPets(query) {
            const q = query.toLowerCase();
            document.querySelectorAll('.pet-card').forEach(card => {
                const text = card.textContent.toLowerCase();
                card.style.display = text.includes(q) ? '' : 'none';
            });
            carouselIndex = 0;
            updateCarousel();
        }

        function filterBySpecies(species) {
            showPanel('pet-list-panel');
            document.querySelectorAll('.pet-card').forEach(card => {
                if (!species) {
                    card.style.display = '';
                    return;
                }
                card.style.display = card.dataset.species === species.toLowerCase() ? '' : 'none';
            });
            carouselIndex = 0;
            updateCarousel();
        }

        window.addEventListener('resize', () => {
            if (document.getElementById('pet-list-panel').classList.contains('active-panel')) {
                updateCarousel();
            }
        });
    </script>
</body>
</html>
