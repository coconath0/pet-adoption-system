<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/images/logo.jpeg">
    <link rel="stylesheet" href="/public/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <title>PAWS | Find Your Perfect Companion</title>
    <style>
        .home-shell {
            grid-template-columns: 72px 1fr;
        }

        .home-main {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #fff8f2;
            overflow: hidden;
            position: relative;
        }

        .home-hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 56px 48px 320px;
            flex: 1;
            gap: 18px;
            width: 100%;
            max-width: 900px;
        }

        .home-badge {
            background: #fde8d8;
            color: #c96a3a;
            border-radius: 50px;
            padding: 7px 22px;
            font-size: 0.87rem;
            font-weight: 600;
            display: inline-block;
            letter-spacing: 0.02em;
        }

        .home-title {
            font-size: clamp(2.4rem, 5.5vw, 4rem);
            font-weight: 800;
            line-height: 1.08;
            color: #1a0f00;
            margin: 0;
        }

        .home-title span {
            color: #c96a3a;
        }

        .home-subtitle {
            font-size: 1.02rem;
            color: #7a6a5a;
            max-width: 500px;
            line-height: 1.65;
            margin: 0;
        }

        .home-cta-row {
            display: flex;
            gap: 18px;
            align-items: center;
            margin-top: 6px;
        }

        .home-cta-primary {
            background: #c96a3a;
            color: #fff;
            border: none;
            border-radius: 50px;
            padding: 14px 40px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 6px 20px rgba(201, 106, 58, 0.35);
        }

        .home-cta-primary:hover {
            background: #a8522a;
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(201, 106, 58, 0.42);
        }

        .home-cta-secondary {
            color: #c96a3a;
            font-size: 0.92rem;
            font-weight: 500;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: gap 0.18s;
        }

        .home-cta-secondary:hover {
            gap: 12px;
        }

        .home-stats {
            display: flex;
            gap: 44px;
            margin-top: 8px;
            padding: 18px 32px;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.06);
        }

        .home-stat {
            text-align: center;
        }

        .home-stat-num {
            font-size: 1.5rem;
            font-weight: 700;
            color: #c96a3a;
            line-height: 1;
        }

        .home-stat-label {
            font-size: 0.75rem;
            color: #b0a090;
            margin-top: 4px;
        }

        .home-stat-divider {
            width: 1px;
            background: #f0e0d0;
            align-self: stretch;
        }

        .home-pets-image {
            /*width: 100%;*/
            display: flex;
            justify-content: center;
            align-items: flex-end;
            flex-shrink: 0;
            margin-top: auto;
            position: absolute;
            bottom: 0;
            pointer-events: none;
        }

        .home-pets-image img {
            max-width: 900px;
            width: 100%;
            height: auto;
            display: block;
            object-fit: contain;
            object-position: center bottom;
        }
    </style>
</head>
<body>
    <div class="app-shell home-shell">

        <!-- Left Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <img src="/images/logo.jpeg" alt="logo">
            </div>
            <nav class="sidebar-nav">
                <a href="/public/index.html" class="nav-item active" title="Home">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                </a>
                <a href="/public/pet.html" class="nav-item" title="Pets">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></svg>
                </a>
                <a href="/public/pet.html" class="nav-item" title="Add Pet">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                </a>
                <a href="/public/pet.html" class="nav-item" title="Find Pet">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                </a>
                <a href="/public/pet.html" class="nav-item" title="Edit Pet">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                </a>
                <a href="/public/pet.html" class="nav-item" title="Delete Pet">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
                </a>
            </nav>
        </aside>

        <!-- Home Main Content -->
        <main class="home-main">
            <div class="home-hero">
                <span class="home-badge">🐾 Adopt Don't Shop</span>
                <h1 class="home-title">Find Your Perfect<br><span>Companion</span></h1>
                <p class="home-subtitle">Browse loving pets waiting patiently for their forever home. Every adoption changes a life, including yours.</p>
                <div class="home-cta-row">
                    <a href="/public/pet.html" class="home-cta-primary">Browse Pets</a>
                    <a href="/public/pet.html" class="home-cta-secondary">See all pets →</a>
                </div>
                <div class="home-stats">
                    <div class="home-stat">
                        <div class="home-stat-num">100+</div>
                        <div class="home-stat-label">Pets Available</div>
                    </div>
                    <div class="home-stat-divider"></div>
                    <div class="home-stat">
                        <div class="home-stat-num">50+</div>
                        <div class="home-stat-label">Breeds</div>
                    </div>
                    <div class="home-stat-divider"></div>
                    <div class="home-stat">
                        <div class="home-stat-num">Free</div>
                        <div class="home-stat-label">Always to Adopt</div>
                    </div>
                </div>
            </div>

            <!-- Pets image peeking from bottom -->
            <div class="home-pets-image">
                <img src="/public/home/home-page.png" alt="Happy pets waiting for adoption">
            </div>
        </main>

    </div>
</body>
</html>
